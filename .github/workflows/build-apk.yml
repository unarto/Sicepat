name: Build Project Cloud

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Cloud Build Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: '0'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      # Solusi Otomatis: Membuat ulang wrapper 9.3.1 yang bersih di Cloud
      - name: Setup Gradle Wrapper (v9.3.1)
        run: |
          mkdir -p gradle/wrapper
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "Gradle wrapper jar is missing. Generating..."
            gradle wrapper --gradle-version 9.3.1 || {
              echo "Gradle command failed. Downloading gradle-wrapper.jar directly..."
              curl -Lo gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
            }
          else
            gradle wrapper --gradle-version 9.3.1
          fi

      - name: Ensure gradlew is executable
        run: chmod +x gradlew

      - name: Create Dummy API Secrets
        run: |
          touch .env
          echo "MAPS_API_KEY=mock_key" >> .env

      - name: Detect and Setup Debug Keystore
        run: |
          if [ -f "debug.keystore" ]; then
            echo "debug.keystore already exists."
          elif [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "No debug keystore found! Generating a dummy debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      # Proses compile APK (Sesuai workflow yang kamu kirim)
      - name: Build Split Debug APKs
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      # Proses compile JAR (Menjaga kalau proyekmu butuh output .jar)
      - name: Build JAR File
        run: ./gradlew jar --stacktrace --no-daemon || echo "Bukan proyek JAR, skip langkah ini."

      # ==== UPLOAD ARTIFAK ====

      - name: Upload arm64-v8a APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-debug
          path: app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
          if-no-files-found: warn
          retention-days: 7

      - name: Upload armeabi-v7a APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-armeabi-v7a-debug
          path: app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk
          if-no-files-found: warn
          retention-days: 7

      # Otomatis upload file .jar jika proyek kamu menghasilkan file JAR
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-jar-outputs
          path: "**/build/libs/*.jar"
          if-no-files-found: ignore
          retention-days: 7
